                const currentVal = select.value;
                select.innerHTML = '<option value="all">Все треки</option>';
                playlists.forEach(p => { if (p === 'all') return; const opt = document.createElement('option'); opt.value = p; opt.textContent = p; if (p === currentVal) opt.selected = true; select.appendChild(opt); });
            }
        }

        function switchPlaylist(pl) { currentPlaylist = pl; renderPlaylistTabs(); renderMusicGrid(); }

        function renderPlaylistInfo() {
            const oldInfo = document.getElementById('playlistInfoBar');
            if (oldInfo) oldInfo.remove();
            if (currentPlaylist === 'all') return;
            const filtered = musicLibrary.filter(t => t.playlist === currentPlaylist);
            const grid = document.getElementById('musicGrid');
            const infoBar = document.createElement('div');
            infoBar.id = 'playlistInfoBar';
            infoBar.className = 'playlist-info-bar';
            infoBar.innerHTML = `
                <div class="playlist-stats">
                    ${playlistFolderIcon}
                    Плейлист: <strong>${currentPlaylist}</strong> * 
                    Треков: <strong>${filtered.length}</strong>
                </div>
                <div class="playlist-actions">
                    <button class="playlist-action-btn edit-btn" onclick="openEditPlaylistModal('${currentPlaylist}')" title="Редактировать плейлист">${editIcon} Редактировать</button>
                    <button class="playlist-action-btn add-btn" onclick="addMusicToPlaylist('${currentPlaylist}')" title="Добавить музыку в плейлист">${addIcon} Добавить музыку</button>
                    <button class="playlist-action-btn export-btn" onclick="exportPlaylist('${currentPlaylist}')" title="Экспортировать плейлист">${exportIcon} Экспорт</button>
                </div>
            `;
            if (grid && grid.parentNode) { grid.parentNode.insertBefore(infoBar, grid); }
        }

        function addMusicToPlaylist(playlistName) {
            openAddMusicModal();
            const select = document.getElementById('trackPlaylist');
            if (select && playlistName !== 'all') {
                let found = false;
                for (let i = 0; i < select.options.length; i++) {
                    if (select.options[i].value === playlistName) { select.selectedIndex = i; found = true; break; }
                }
                if (!found) {
                    const option = document.createElement('option');
                    option.value = playlistName; option.textContent = playlistName; option.selected = true;
                    select.appendChild(option);
                }
            }
            const modalTitle = document.querySelector('#addMusicPanel h2');
            if (modalTitle) { modalTitle.textContent = `Добавить музыку в "${playlistName}"`; }
        }

        function exportPlaylist(playlistName) {
            const playlistTracks = musicLibrary.filter(t => t.playlist === playlistName);
            if (playlistTracks.length === 0) { showToast('Плейлист пуст, нечего экспортировать'); return; }
            const exportData = {
                playlistName: playlistName,
                tracks: playlistTracks.map(t => ({ id: t.id, name: t.name, artist: t.artist, url: t.url ? 'base64_data' : null, fileSize: t.fileSize, fileName: t.fileName, addedDate: t.addedDate, cover: t.cover || null })),
                exportDate: new Date().toISOString(), version: '1.0'
            };
            const jsonData = JSON.stringify(exportData, null, 2);
            const blob = new Blob([jsonData], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url;
            a.download = `playlist_${playlistName.replace(/[^a-zа-яё0-9]/gi, '_')}.json`;
            a.click(); URL.revokeObjectURL(url);
            showToast(`Плейлист "${playlistName}" экспортирован! (${playlistTracks.length} треков)`);
        }

        async function importPlaylist(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (imported.playlistName && imported.tracks) {
                        const playlistName = imported.playlistName;
                        let importedCount = 0;
                        if (!playlists.includes(playlistName)) { playlists.push(playlistName); }
                        imported.tracks.forEach(track => {
                            const exists = musicLibrary.find(t => t.id === track.id);
                            if (!exists) {
                                const newTrack = { ...track, playlist: playlistName, id: track.id || Date.now() + Math.random() };
                                musicLibrary.push(newTrack); importedCount++;
                            } else { exists.playlist = playlistName; }
                        });
                        await saveAllData();
                        renderPlaylistTabs(); renderMusicGrid(); updateStorageInfo();
                        currentPlaylist = playlistName; renderPlaylistTabs(); renderMusicGrid();
                        showToast(`Плейлист "${playlistName}" загружен! Добавлено ${importedCount} новых треков`);
                    } else { throw new Error('Неверный формат файла плейлиста'); }
                } catch (err) { alert('Ошибка загрузки плейлиста: ' + err.message); }
            };
            reader.readAsText(file); e.target.value = '';
        }

        function openCreatePlaylistModal() {
            document.getElementById('newPlaylistName').value = '';
            const trackList = document.getElementById('newPlaylistTrackList');
            trackList.innerHTML = '';
            if (musicLibrary.length === 0) {
                trackList.innerHTML = '<div style="padding:12px;color:var(--text-secondary);font-size:12px;">Нет треков в библиотеке</div>';
            } else {
                musicLibrary.forEach(track => {
                    if (!track || !track.id) return;
                    const div = document.createElement('div'); div.className = 'track-select-item';
                    const checkbox = document.createElement('input'); checkbox.type = 'checkbox'; checkbox.checked = false; checkbox.dataset.trackId = track.id;
                    const info = document.createElement('div'); info.className = 'track-info';
                    info.innerHTML = '<div>' + track.name + '</div><div class="track-artist">' + track.artist + '</div>';
                    div.appendChild(checkbox); div.appendChild(info);
                    div.onclick = (e) => { if (e.target !== checkbox) { checkbox.checked = !checkbox.checked; } };
                    trackList.appendChild(div);
                });
            }
            document.getElementById('createPlaylistPanel').classList.add('active');
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeCreatePlaylistModal() {
            document.getElementById('createPlaylistPanel').classList.remove('active');
            document.getElementById('modalOverlay').classList.remove('active');
        }

        async function createPlaylistFromModal() {
            const name = document.getElementById('newPlaylistName').value.trim();
            if (!name) { alert('Введите название плейлиста'); return; }
            if (playlists.includes(name)) { alert('Плейлист с таким названием уже существует'); return; }
            const checkboxes = document.querySelectorAll('#newPlaylistTrackList input[type="checkbox"]');
            const selectedTracks = [];
            checkboxes.forEach(cb => { if (cb.checked) { const trackId = parseInt(cb.dataset.trackId); const track = musicLibrary.find(t => t.id === trackId); if (track) selectedTracks.push(track); } });
            playlists.push(name);
            selectedTracks.forEach(track => { track.playlist = name; });
            await saveAllData();
            closeCreatePlaylistModal();
            currentPlaylist = name; renderPlaylistTabs(); renderMusicGrid(); updateStorageInfo();
            showToast('Плейлист "' + name + '" создан! (' + selectedTracks.length + ' треков)');
        }

        function openEditPlaylistModal(name) {
            editingPlaylist = name;
            document.getElementById('editPlaylistTitle').textContent = 'Редактировать: ' + name;
            document.getElementById('editPlaylistName').value = name;
            const trackList = document.getElementById('editTrackList');
            trackList.innerHTML = '';
            if (musicLibrary.length === 0) {
                trackList.innerHTML = '<div style="padding:12px;color:var(--text-secondary);font-size:12px;">Нет треков в библиотеке</div>';
            } else {
                musicLibrary.forEach(track => {
                    if (!track || !track.id) return;
                    const div = document.createElement('div'); div.className = 'track-select-item';
                    const checkbox = document.createElement('input'); checkbox.type = 'checkbox'; checkbox.checked = track.playlist === name; checkbox.dataset.trackId = track.id;
                    const info = document.createElement('div'); info.className = 'track-info';
                    info.innerHTML = '<div>' + track.name + '</div><div class="track-artist">' + track.artist + '</div>';
                    div.appendChild(checkbox); div.appendChild(info);
                    div.onclick = (e) => { if (e.target !== checkbox) { checkbox.checked = !checkbox.checked; } };
                    trackList.appendChild(div);
                });
            }
            document.getElementById('editPlaylistPanel').classList.add('active');
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeEditPlaylistModal() {
            document.getElementById('editPlaylistPanel').classList.remove('active');
            document.getElementById('modalOverlay').classList.remove('active');
            editingPlaylist = null;
        }

        async function savePlaylistEdit() {
            const newName = document.getElementById('editPlaylistName').value.trim();
            if (!newName) { alert('Введите название плейлиста'); return; }
            if (newName !== editingPlaylist && playlists.includes(newName)) { alert('Плейлист с таким названием уже существует'); return; }
            const checkboxes = document.querySelectorAll('#editTrackList input[type="checkbox"]');
            let count = 0;
            checkboxes.forEach(cb => {
                const trackId = parseInt(cb.dataset.trackId);
                const track = musicLibrary.find(t => t.id === trackId);
                if (track) { if (cb.checked) { track.playlist = newName; count++; } else if (track.playlist === editingPlaylist) { track.playlist = 'all'; } }
            });
            if (newName !== editingPlaylist) {
                const idx = playlists.indexOf(editingPlaylist);
                if (idx !== -1) { playlists[idx] = newName; musicLibrary.forEach(t => { if (t.playlist === editingPlaylist) t.playlist = newName; }); }
                if (currentPlaylist === editingPlaylist) currentPlaylist = newName;
            }
            await saveAllData();
            closeEditPlaylistModal(); renderPlaylistTabs(); renderMusicGrid(); updateStorageInfo();
            showToast('Плейлист "' + newName + '" обновлен! (' + count + ' треков)');
        }

        function deletePlaylist(name) {
            if (name === 'all') return;
            playlists = playlists.filter(p => p !== name);
            musicLibrary.forEach(t => { if (t.playlist === name) t.playlist = 'all'; });
            if (currentPlaylist === name) currentPlaylist = 'all';
            saveAllData(); renderPlaylistTabs(); renderMusicGrid();
            showToast('Плейлист "' + name + '" удален');
        }

        function openAddMusicModal() {
            selectedFiles = []; coverImage = null;
            document.getElementById('selectedFilesText').textContent = '';
            document.getElementById('trackName').value = ''; document.getElementById('trackArtist').value = '';
            document.getElementById('fileInput').value = ''; document.getElementById('coverInput').value = '';
            document.getElementById('coverPreview').style.display = 'none';
            document.getElementById('addMusicPanel').classList.add('active');
            document.getElementById('modalOverlay').classList.add('active');
            renderPlaylistTabs();
        }

        function closeAddMusicModal() {
            document.getElementById('addMusicPanel').classList.remove('active');
            document.getElementById('modalOverlay').classList.remove('active');
            selectedFiles = []; coverImage = null;
            const modalTitle = document.querySelector('#addMusicPanel h2');
            if (modalTitle) { modalTitle.textContent = 'Добавить музыку'; }
        }

        function handleFileSelect(e) { handleFiles(e.target.files); }

        function handleFiles(files) {
            selectedFiles = Array.from(files).filter(f => f.type.startsWith('audio/'));
            if (!selectedFiles.length) { alert('Выберите аудиофайлы'); return; }
            document.getElementById('selectedFilesText').textContent = 'Выбрано: ' + selectedFiles.length;
            if (selectedFiles.length === 1 && !document.getElementById('trackName').value) {
                document.getElementById('trackName').value = selectedFiles[0].name.replace(/\.[^/.]+$/, "");
            }
        }

        function previewCover() {
            const f = document.getElementById('coverInput').files[0];
            if (f) {
                const r = new FileReader();
                r.onload = e => { coverImage = e.target.result; const p = document.getElementById('coverPreview'); p.src = coverImage; p.style.display = 'block'; };
                r.readAsDataURL(f);
            }
        }

        async function addMusic() {
            if (!selectedFiles.length) { alert('Выберите аудиофайл!'); return; }
            const baseName = document.getElementById('trackName').value;
            const artist = document.getElementById('trackArtist').value || 'Неизвестный исполнитель';
            const playlist = document.getElementById('trackPlaylist').value;
            for (const file of selectedFiles) {
                const reader = new FileReader();
                const data = await new Promise((resolve) => { reader.onload = (e) => resolve(e.target.result); reader.readAsDataURL(file); });
                musicLibrary.push({
                    id: Date.now() + Math.random(),
                    name: selectedFiles.length === 1 ? (baseName || file.name.replace(/\.[^/.]+$/, "")) : file.name.replace(/\.[^/.]+$/, ""),
                    artist: artist, url: data, playlist: playlist, fileSize: file.size, fileName: file.name,
                    cover: coverImage || null, addedDate: new Date().toISOString()
                });
            }
            await saveAllData();
            closeAddMusicModal(); renderPlaylistTabs(); renderMusicGrid(); updateStorageInfo();
            showToast('Добавлено ' + selectedFiles.length + ' треков');
        }

        async function removeMusic(id) {
            const wasPlaying = currentTrackIndex !== -1 && musicLibrary[currentTrackIndex]?.id === id;
            musicLibrary = musicLibrary.filter(t => t.id !== id);
            await deleteTrackFromDB(id);
            if (wasPlaying) stopPlayback();
            renderMusicGrid(); updateStorageInfo();
            showToast('Трек удален');
        }

        function renderMusicGrid() {
            const grid = document.getElementById('musicGrid');
            if (!grid) return;
            const oldInfo = document.getElementById('playlistInfoBar');
            if (oldInfo) oldInfo.remove();
            const filtered = currentPlaylist === 'all' ? musicLibrary : musicLibrary.filter(t => t.playlist === currentPlaylist);
            if (!filtered.length) {
                if (currentPlaylist === 'all') {
                    grid.innerHTML = '<div class="empty-state">Нет треков в библиотеке.<br><span style="font-size:12px;opacity:0.6;">Добавьте музыку или загрузите плейлист.</span></div>';
                } else {
                    grid.innerHTML = `<div class="empty-state">Нет треков в плейлисте "${currentPlaylist}".<br><br><button class="add-to-playlist-btn" onclick="addMusicToPlaylist('${currentPlaylist}')"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='black'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z'/%3E%3C/svg%3E" style="width: 14px; height: 14px; vertical-align: middle;">Добавить музыку в "${currentPlaylist}"</button></div>`;
                }
                return;
            }
            if (currentPlaylist !== 'all') { renderPlaylistInfo(); }
            grid.innerHTML = filtered.map((track, idx) => {
                const gi = musicLibrary.indexOf(track);
                const isCurrent = currentTrackIndex === gi && isPlaying;
                return `<div class="music-card ${isCurrent ? 'playing' : ''}" onclick="playTrack(${gi})">
                    <div class="cover-image">${track.cover ? '<img src="' + track.cover + '" alt="">' : '<img class="default-cover" src="data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'white\'%3E%3Cpath d=\'M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z\'/%3E%3C/svg%3E" alt="">'}</div>
                    <div class="track-details"><h3>${track.name}</h3><div class="artist">${track.artist}</div>
                        <div class="track-meta">${settings.showDuration ? track.fileSize ? formatFileSize(track.fileSize) : '' : ''}${currentPlaylist === 'all' && track.playlist !== 'all' ? `<span class="playlist-indicator">${folderIcon} ${track.playlist}</span>` : ''}</div>
                    </div>
                    ${isCurrent ? '<div class="playing-indicator"><span></span><span></span><span></span><span></span></div>' : ''}
                    ${!isCurrent ? `<button class="delete-btn" onclick="event.stopPropagation(); removeMusic(${track.id})" title="Удалить">${trashIcon}</button>` : ''}
                </div>`;
            }).join('');
            applySettings();
        }

        function formatFileSize(b) { if (!b) return ''; const s = ['Б', 'КБ', 'МБ', 'ГБ']; const i = Math.floor(Math.log(b) / Math.log(1024)); return (b / Math.pow(1024, i)).toFixed(1) + ' ' + s[i]; }

        function playTrack(i) {
            if (i < 0 || i >= musicLibrary.length) return;
            currentTrackIndex = i; audio.src = musicLibrary[i].url;
            audio.playbackRate = settings.playbackSpeed / 100;
            audio.play().then(() => { isPlaying = true; updatePlayerUI(); renderMusicGrid(); updateFullscreenPlayer(); }).catch(() => alert('Ошибка воспроизведения'));
        }

        function togglePlay() {
            if (currentTrackIndex === -1) { if (musicLibrary.length) playTrack(0); return; }
            isPlaying ? audio.pause() : audio.play().then(() => { isPlaying = true; });
            isPlaying = !isPlaying; updatePlayerUI(); renderMusicGrid(); updateFullscreenPlayer();
        }

        function stopPlayback() { audio.pause(); audio.currentTime = 0; isPlaying = false; currentTrackIndex = -1; updatePlayerUI(); renderMusicGrid(); updateFullscreenPlayer(); }

        function nextTrack() {
            if (!musicLibrary.length) return;
            const filtered = currentPlaylist === 'all' ? musicLibrary : musicLibrary.filter(t => t.playlist === currentPlaylist);
            const currentIdx = filtered.findIndex(t => t.id === musicLibrary[currentTrackIndex]?.id);
            if (currentIdx !== -1 && currentIdx < filtered.length - 1) { const nextTrack = filtered[currentIdx + 1]; const nextIdx = musicLibrary.indexOf(nextTrack); if (nextIdx !== -1) { playTrack(nextIdx); return; } }
            if (filtered.length > 0) { const firstTrack = filtered[0]; const firstIdx = musicLibrary.indexOf(firstTrack); if (firstIdx !== -1) { playTrack(firstIdx); return; } }
            stopPlayback();
        }

        function previousTrack() {
            if (currentTrackIndex > 0) {
                const filtered = currentPlaylist === 'all' ? musicLibrary : musicLibrary.filter(t => t.playlist === currentPlaylist);
                const currentIdx = filtered.findIndex(t => t.id === musicLibrary[currentTrackIndex]?.id);
                if (currentIdx > 0) { const prevTrack = filtered[currentIdx - 1]; const prevIdx = musicLibrary.indexOf(prevTrack); if (prevIdx !== -1) playTrack(prevIdx); }
                else if (filtered.length > 0) { const lastTrack = filtered[filtered.length - 1]; const lastIdx = musicLibrary.indexOf(lastTrack); if (lastIdx !== -1) playTrack(lastIdx); }
            }
        }

        function toggleRepeat() {
            const icon = document.getElementById('repeatIcon');
            if (repeatMode === 'none') { repeatMode = 'all'; icon.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z'/%3E%3C/svg%3E"; } 
            else if (repeatMode === 'all') { repeatMode = 'one'; icon.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z'/%3E%3C/svg%3E"; } 
            else { repeatMode = 'none'; icon.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z'/%3E%3C/svg%3E"; }
            document.getElementById('fullscreenRepeatIcon').src = icon.src;
        }

        function shufflePlay() { if (musicLibrary.length) playTrack(Math.floor(Math.random() * musicLibrary.length)); }

        function updatePlayerUI() {
            document.getElementById('playIcon').src = isPlaying ? "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='black'%3E%3Cpath d='M6 19h4V5H6v14zm8-14v14h4V5h-4z'/%3E%3C/svg%3E" : "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='black'%3E%3Cpath d='M8 5v14l11-7z'/%3E%3C/svg%3E";
            if (currentTrackIndex >= 0 && currentTrackIndex < musicLibrary.length) {
                const t = musicLibrary[currentTrackIndex];
                document.getElementById('currentTrack').textContent = t.name;
                document.getElementById('currentArtist').textContent = t.artist;
                document.getElementById('trackCoverImage').style.display = t.cover ? 'block' : 'none';
                document.getElementById('trackCoverPlaceholder').style.display = t.cover ? 'none' : 'block';
                if (t.cover) document.getElementById('trackCoverImage').src = t.cover;
            } else {
                document.getElementById('currentTrack').textContent = 'Нет трека';
                document.getElementById('currentArtist').textContent = 'Выберите трек';
                document.getElementById('trackCoverImage').style.display = 'none';
                document.getElementById('trackCoverPlaceholder').style.display = 'block';
            }
        }

        function updateProgress() {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progressFill').style.width = progress + '%';
                document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
                document.getElementById('fullscreenProgressFill').style.width = progress + '%';
                document.getElementById('fullscreenCurrentTime').textContent = formatTime(audio.currentTime);
            }
        }

        function seekTrack(e) {
            const rect = document.getElementById('progressBar').getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        }

        function adjustVolume() { audio.volume = document.getElementById('volumeSlider').value / 100; }

        function formatTime(s) { if (isNaN(s)) return '0:00'; const m = Math.floor(s / 60), sec = Math.floor(s % 60); return m + ':' + (sec < 10 ? '0' : '') + sec; }

        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('active'); }

        function updateIconSize() { const val = document.getElementById('iconSize').value; document.getElementById('iconSizeValue').textContent = val; customization.iconSize = parseInt(val); document.getElementById('fullscreenDefaultCover').style.width = val + 'px'; document.getElementById('fullscreenDefaultCover').style.height = val + 'px'; }
        function updateIconPosition() {
            customization.iconPosition = document.getElementById('iconPosition').value;
            const img = document.getElementById('fullscreenDefaultCover');
            if (customization.iconPosition === 'top') { img.style.top = '20%'; img.style.transform = 'translate(-50%, -20%)'; }
            else if (customization.iconPosition === 'bottom') { img.style.top = '80%'; img.style.transform = 'translate(-50%, -80%)'; }
            else { img.style.top = '50%'; img.style.transform = 'translate(-50%, -50%)'; }
        }
        function updateTextSize() { const val = document.getElementById('textSize').value; document.getElementById('textSizeValue').textContent = val; customization.textSize = parseInt(val); document.getElementById('fullscreenTrackName').style.fontSize = val + 'px'; }
        function updateTextColor() { customization.textColor = document.getElementById('textColor').value; document.getElementById('fullscreenTrackName').style.color = customization.textColor; }

        function changeTheme() { settings.theme = document.getElementById('themeSelect').value; applySettings(); saveAllData(); }
        function setAccentColor(c) { settings.accentColor = c; document.querySelectorAll('.color-option').forEach(el => el.classList.remove('selected')); event.target.classList.add('selected'); applySettings(); saveAllData(); }
        function changeFontSize() { settings.fontSize = document.getElementById('fontSizeSlider').value; document.getElementById('fontSizeValue').textContent = settings.fontSize + 'px'; applySettings(); saveAllData(); }
        function changeBorderRadius() { settings.borderRadius = document.getElementById('borderRadiusSlider').value; document.getElementById('borderRadiusValue').textContent = settings.borderRadius + 'px'; applySettings(); saveAllData(); }
        function changeCardSize() { settings.cardSize = document.getElementById('cardSizeSelect').value; applySettings(); saveAllData(); }
        function changeCardOpacity() { settings.cardOpacity = document.getElementById('cardOpacity').value; document.getElementById('cardOpacityVal').textContent = settings.cardOpacity + '%'; applySettings(); }
        function changeAutoPlay() { settings.autoPlay = document.getElementById('autoPlay').value === 'true'; saveAllData(); }
        function changeShowDuration() { settings.showDuration = document.getElementById('showDuration').value === 'true'; renderMusicGrid(); saveAllData(); }
        function changeShowCoverInPlayer() { settings.showCoverInPlayer = document.getElementById('showCoverInPlayer').value === 'true'; applySettings(); saveAllData(); }
        function changePlaybackSpeed() { settings.playbackSpeed = document.getElementById('playbackSpeed').value; document.getElementById('playbackSpeedValue').textContent = (settings.playbackSpeed / 100).toFixed(1) + 'x'; if (audio) audio.playbackRate = settings.playbackSpeed / 100; saveAllData(); }
        function changeSortOrder() { settings.sortOrder = document.getElementById('sortOrder').value; sortLibrary(); renderMusicGrid(); saveAllData(); }
        function changeCardAnimation() { settings.cardAnimation = document.getElementById('cardAnimation').value; applySettings(); saveAllData(); }
        function changeCardShadow() { settings.cardShadow = document.getElementById('cardShadow').value; applySettings(); saveAllData(); }
        function changeShowPlayingIndicator() { settings.showPlayingIndicator = document.getElementById('showPlayingIndicator').value === 'true'; applySettings(); saveAllData(); }
        function changeAutoSave() { settings.autoSave = document.getElementById('autoSave').value === 'true'; saveAllData(); }

        function exportLibrary() {
            const data = JSON.stringify({ tracks: musicLibrary.map(t => ({ ...t, url: t.url ? 'base64_data' : null })), playlists: playlists, version: '2.0' }, null, 2);
            const blob = new Blob([data], { type: 'application/json' }); const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'sonify_library.json'; a.click(); URL.revokeObjectURL(url);
        }

        async function importLibrary(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (imported.playlistName && imported.tracks) {
                        const playlistName = imported.playlistName; let importedCount = 0;
                        if (!playlists.includes(playlistName)) { playlists.push(playlistName); }
                        imported.tracks.forEach(track => {
                            const exists = musicLibrary.find(t => t.id === track.id);
                            if (!exists) { const newTrack = { ...track, playlist: playlistName, id: track.id || Date.now() + Math.random() }; musicLibrary.push(newTrack); importedCount++; }
                            else { exists.playlist = playlistName; }
                        });
                        await saveAllData(); renderPlaylistTabs(); renderMusicGrid(); updateStorageInfo();
                        showToast(`Плейлист "${playlistName}" импортирован! Добавлено ${importedCount} новых треков`);
                    } else if (Array.isArray(imported)) {
                        musicLibrary = imported; playlists = ['all'];
                        imported.forEach(t => { if (t.playlist && t.playlist !== 'all' && !playlists.includes(t.playlist)) { playlists.push(t.playlist); } });
                        await saveAllData(); renderPlaylistTabs(); renderMusicGrid(); updateStorageInfo();
                        showToast('Библиотека импортирована! (' + musicLibrary.length + ' треков)');
                    } else if (imported.tracks && imported.playlists) {
                        musicLibrary = imported.tracks; playlists = ['all', ...imported.playlists.filter(p => p !== 'all')];
                        await saveAllData(); renderPlaylistTabs(); renderMusicGrid(); updateStorageInfo();
                        showToast('Библиотека импортирована! (' + musicLibrary.length + ' треков, ' + (playlists.length - 1) + ' плейлистов)');
                    } else { throw new Error('Неверный формат файла'); }
                } catch (err) { alert('Ошибка импорта: ' + err.message); }
            };
            reader.readAsText(file); e.target.value = '';
        }

        function resetSettings() {
            settings = { theme: 'dark', accentColor: '#ffffff', fontSize: 14, borderRadius: 16, cardSize: 'medium', cardOpacity: 100, autoPlay: true, showDuration: true, showCoverInPlayer: true, playbackSpeed: 100, sortOrder: 'default', cardAnimation: 'none', cardShadow: 'medium', gapSize: 10, showPlayingIndicator: true, autoSave: true };
            customization = { progressColor: '#ffffff', iconSize: 100, iconPosition: 'center', textSize: 38, textColor: '#ffffff' };
            playerBackgroundImage = null;
            document.getElementById('playerBackground').style.backgroundImage = '';
            document.getElementById('playerBackgroundInput').value = '';
            applySettings(); saveAllData(); renderMusicGrid();
            document.getElementById('progressColor').value = '#ffffff';
            document.getElementById('textColor').value = '#ffffff';
            showToast('Настройки сброшены');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { closeAddMusicModal(); closeCreatePlaylistModal(); closeEditPlaylistModal(); document.getElementById('settingsPanel').classList.remove('active'); closeFullscreenPlayer(); }
            if (e.key === ' ' && document.getElementById('fullscreenPlayerOverlay').classList.contains('active')) { e.preventDefault(); fullscreenTogglePlay(); }
        });

        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) { closeAddMusicModal(); closeCreatePlaylistModal(); closeEditPlaylistModal(); }
        });

        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', onTrackEnd);

        async function startApp() {
            try {
                try { await openDB(); } catch(e) { console.warn('IndexedDB недоступна:', e); }
                await loadAllData();
                applySettings();
                renderPlaylistTabs();
                renderMusicGrid();
                updateStorageInfo();
                
                audio.addEventListener('loadedmetadata', () => {
                    document.getElementById('totalTime').textContent = formatTime(audio.duration);
                    document.getElementById('fullscreenTotalTime').textContent = formatTime(audio.duration);
                });
                
                const uploadArea = document.getElementById('fileUploadArea');
                if (uploadArea) {
                    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
                    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
                    uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
                }
                
                window.addEventListener('beforeunload', () => saveAllData());
                updatePlayerUI();
                document.getElementById('loadingOverlay').classList.add('hidden');
            } catch (error) {
                document.getElementById('loadingOverlay').innerHTML = `<div class="loading-error"><div style="font-size:24px;margin-bottom:12px;">Ошибка</div><div>Ошибка загрузки</div><div class="sub">${error.message || 'Неизвестная ошибка'}</div><button class="retry-btn" onclick="location.reload()">Обновить</button></div>`;
                document.getElementById('loadingOverlay').classList.remove('hidden');
            }
        }

        startApp();
    </script>
</body>
</html>
