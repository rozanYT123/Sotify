<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonify</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montenegrin+Gothic+One&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #121212;
            --bg-tertiary: #1a1a1a;
            --bg-hover: #262626;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a0;
            --accent: #ffffff;
            --accent-hover: #e0e0e0;
            --accent-glow: rgba(255,255,255,0.05);
            --progress-bg: #2a2a2a;
            --border: #1e1e1e;
            --shadow: 0 8px 32px rgba(0,0,0,0.6);
            --font-size: 14px;
            --border-radius: 16px;
            --transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            --danger: #ff4444;
            --danger-bg: rgba(255, 68, 68, 0.15);
            --success: #44ff88;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-tertiary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

        .app-container {
            display: grid;
            grid-template-rows: 1fr 96px;
            height: 100vh;
            max-width: 100vw;
        }

        .main-content {
            background: var(--bg-primary);
            padding: 16px 16px 8px;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            -webkit-overflow-scrolling: touch;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            padding: 8px 0;
            z-index: 5;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
            overflow: hidden;
            width: auto;
            min-width: 80px;
        }

        .logo-text {
            font-family: "Montenegrin Gothic One", serif;
            font-weight: 400;
            font-style: normal;
            font-size: 18px;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
            animation: logoSlideIn 4s ease-in-out infinite;
            white-space: nowrap;
            position: relative;
            opacity: 0;
        }

        @keyframes logoSlideIn {
            0% { 
                transform: translateX(-100%);
                opacity: 0;
                text-shadow: 0 0 5px rgba(255,255,255,0.1);
            }
            20% { 
                transform: translateX(0);
                opacity: 1;
                text-shadow: 0 0 25px rgba(255,255,255,0.6);
            }
            80% { 
                transform: translateX(0);
                opacity: 1;
                text-shadow: 0 0 20px rgba(255,255,255,0.4);
            }
            100% { 
                transform: translateX(100%);
                opacity: 0;
                text-shadow: 0 0 5px rgba(255,255,255,0.1);
            }
        }

        .header-center {
            flex: 1;
            max-width: 500px;
            min-width: 120px;
            margin: 0;
            order: 3;
            width: 100%;
        }

        .search-box {
            width: 100%;
            padding: 8px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            font-family: inherit;
            transition: var(--transition);
            outline: none;
            text-align: center;
            -webkit-appearance: none;
        }

        .search-box:focus {
            border-color: var(--accent);
            background: var(--bg-hover);
        }

        .search-box::placeholder {
            color: #555;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            margin-left: auto;
        }

        .header-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
        }

        .menu-toggle {
            width: 40px;
            height: 40px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: var(--transition);
            padding: 0;
            position: relative;
            touch-action: manipulation;
        }

        .menu-toggle:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        .menu-toggle .bar {
            width: 20px;
            height: 2px;
            background: #fff;
            border-radius: 2px;
            transition: var(--transition);
        }

        .menu-toggle.active .bar:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .menu-toggle.active .bar:nth-child(2) {
            opacity: 0;
        }
        .menu-toggle.active .bar:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        .dropdown-menu {
            position: absolute;
            top: 48px;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 6px;
            min-width: 200px;
            box-shadow: 0 16px 60px rgba(0,0,0,0.8);
            z-index: 50;
            opacity: 0;
            transform: translateY(-10px) scale(0.95);
            pointer-events: none;
            transition: all 0.25s ease;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .dropdown-menu.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .dropdown-menu .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            border: none;
            background: none;
            width: 100%;
            font-family: inherit;
            touch-action: manipulation;
        }

        .dropdown-menu .menu-item:hover {
            background: var(--bg-hover);
            color: #fff;
        }

        .dropdown-menu .menu-item .icon {
            width: 18px;
            height: 18px;
            filter: brightness(0) invert(1);
            opacity: 0.6;
            flex-shrink: 0;
        }

        .dropdown-menu .menu-item:hover .icon {
            opacity: 1;
        }

        .dropdown-menu .menu-divider {
            height: 1px;
            background: var(--border);
            margin: 4px 8px;
        }

        .playlist-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 14px;
            padding: 2px 0;
            align-items: center;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .playlist-tabs::-webkit-scrollbar {
            display: none;
        }

        .playlist-tab {
            padding: 5px 14px;
            border-radius: 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 12px;
            font-weight: 500;
            position: relative;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            touch-action: manipulation;
        }

        .playlist-tab:hover {
            color: #fff;
            background: var(--bg-hover);
        }

        .playlist-tab.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .playlist-tab .tab-remove {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255, 68, 68, 0.2);
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 9px;
            display: none;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            line-height: 1;
            padding: 0;
            touch-action: manipulation;
        }

        .playlist-tab:hover .tab-remove {
            display: flex;
        }

        .playlist-tab .tab-remove:hover {
            background: var(--danger);
            color: #fff;
            transform: scale(1.2);
        }

        .playlist-tab.active .tab-remove {
            color: #000;
            background: rgba(0, 0, 0, 0.2);
        }

        .playlist-tab.active .tab-remove:hover {
            background: var(--danger);
            color: #fff;
        }

        .add-playlist-btn {
            padding: 5px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 11px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: inherit;
            margin-left: 2px;
            white-space: nowrap;
            touch-action: manipulation;
        }

        .add-playlist-btn:hover {
            background: var(--bg-hover);
            color: #fff;
            border-color: var(--accent);
        }

        .add-playlist-btn .icon {
            width: 14px;
            height: 14px;
            filter: brightness(0) invert(1);
            opacity: 0.6;
        }

        .add-playlist-btn:hover .icon {
            opacity: 1;
        }

        .playlist-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border-radius: var(--border-radius);
            margin-bottom: 12px;
            border: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 8px;
        }

        .playlist-info-bar .playlist-stats {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .playlist-info-bar .playlist-stats strong {
            color: #fff;
        }

        .playlist-info-bar .playlist-stats .icon {
            width: 14px;
            height: 14px;
            opacity: 0.6;
            filter: brightness(0) invert(1);
        }

        .playlist-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .playlist-action-btn {
            padding: 5px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 11px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: inherit;
            touch-action: manipulation;
        }

        .playlist-action-btn:hover {
            background: var(--bg-hover);
            color: #fff;
        }

        .playlist-action-btn .icon {
            width: 14px;
            height: 14px;
            filter: brightness(0) invert(1);
            opacity: 0.6;
        }

        .playlist-action-btn:hover .icon {
            opacity: 1;
        }

        .playlist-action-btn.edit-btn:hover {
            border-color: #FF9800;
            color: #FF9800;
        }

        .playlist-action-btn.edit-btn:hover .icon {
            filter: brightness(0) saturate(100%) invert(60%) sepia(85%) saturate(1352%) hue-rotate(1deg) brightness(105%) contrast(101%);
        }

        .playlist-action-btn.add-btn:hover {
            border-color: #2196F3;
            color: #2196F3;
        }

        .playlist-action-btn.add-btn:hover .icon {
            filter: brightness(0) saturate(100%) invert(35%) sepia(98%) saturate(1352%) hue-rotate(200deg) brightness(100%) contrast(101%);
        }

        .playlist-action-btn.export-btn:hover {
            border-color: #4CAF50;
            color: #4CAF50;
        }

        .playlist-action-btn.export-btn:hover .icon {
            filter: brightness(0) saturate(100%) invert(55%) sepia(75%) saturate(632%) hue-rotate(95deg) brightness(95%) contrast(90%);
        }

        .add-to-playlist-btn {
            padding: 10px 20px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
            font-family: inherit;
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            touch-action: manipulation;
        }

        .add-to-playlist-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .add-to-playlist-btn .icon {
            width: 16px;
            height: 16px;
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }

        .music-card {
            background: var(--bg-secondary);
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            padding: 10px 12px;
            gap: 12px;
            border: 2px solid transparent;
            overflow: hidden;
            min-height: 64px;
            position: relative;
            transform: scale(1);
            touch-action: manipulation;
        }

        .music-card.playing {
            transform: scale(1.02);
            border-color: var(--accent);
            background: var(--accent-glow);
            box-shadow: 0 8px 32px rgba(255,255,255,0.1);
        }

        .music-card .track-details {
            flex: 1;
            min-width: 0;
        }

        .music-card:hover:not(.edit-mode) {
            background: var(--bg-tertiary);
            border-color: var(--accent);
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .music-card.playing:hover {
            transform: translateY(-2px) scale(1.03);
        }

        .music-card .cover-image {
            width: 48px;
            height: 48px;
            min-width: 48px;
            background: var(--bg-tertiary);
            border-radius: 10px;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .music-card:hover .cover-image {
            transform: rotate(-3deg) scale(1.05);
        }

        .music-card .cover-image img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; transition: transform 0.3s ease; }
        .music-card .cover-image .default-cover { width: 24px; height: 24px; opacity: 0.3; transition: transform 0.3s ease; }

        .music-card:hover .cover-image img {
            transform: scale(1.1);
        }

        .music-card h3 {
            font-size: 13px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 600;
            color: #fff;
        }

        .music-card .artist {
            color: var(--text-secondary);
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-card .track-meta {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
            font-size: 10px;
            color: #555;
        }

        .track-meta .playlist-indicator {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            color: var(--accent);
            margin-left: 4px;
        }

        .track-meta .playlist-indicator .icon {
            width: 12px;
            height: 12px;
            opacity: 0.6;
            filter: brightness(0) invert(1);
        }

        .delete-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            background: rgba(255, 40, 40, 0.15);
            border: 1.5px solid rgba(255, 40, 40, 0.3);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
            padding: 0;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .music-card:hover .delete-btn {
            opacity: 1;
            pointer-events: all;
        }

        .music-card.playing .delete-btn {
            display: none;
        }

        .delete-btn:hover {
            background: rgba(255, 40, 40, 0.25);
            border-color: #ff4444;
            transform: translateY(-50%) scale(1.1);
        }

        .delete-btn svg {
            width: 16px;
            height: 16px;
            fill: #ff4444;
        }

        .playing-indicator {
            display: none;
            gap: 2px;
            align-items: flex-end;
            height: 12px;
            margin-left: 2px;
            flex-shrink: 0;
        }

        .music-card.playing .playing-indicator { display: flex; }

        .playing-indicator span {
            width: 3px;
            background: var(--accent);
            border-radius: 4px;
            animation: soundBars 0.7s infinite alternate ease-in-out;
        }

        .playing-indicator span:nth-child(1) { height: 6px; }
        .playing-indicator span:nth-child(2) { height: 12px; animation-delay: 0.15s; }
        .playing-indicator span:nth-child(3) { height: 4px; animation-delay: 0.3s; }
        .playing-indicator span:nth-child(4) { height: 10px; animation-delay: 0.45s; }

        @keyframes soundBars {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }

        .player-bar {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            z-index: 10;
            position: relative;
            min-height: 80px;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            max-width: 220px;
            min-width: 120px;
            cursor: pointer;
            touch-action: manipulation;
        }

        .now-playing .track-cover {
            width: 44px;
            height: 44px;
            min-width: 44px;
            background: var(--bg-tertiary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .now-playing .track-cover img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
        .now-playing .track-cover .default-cover { width: 20px; height: 20px; opacity: 0.3; }

        .track-info h4 {
            font-size: 12px;
            margin-bottom: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 600;
        }

        .track-info p { font-size: 10px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .player-controls {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            max-width: 420px;
            min-width: 140px;
        }

        .controls-buttons { display: flex; align-items: center; gap: 4px; }

        .control-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            touch-action: manipulation;
        }

        .control-btn:hover {
            color: #fff;
            background: var(--bg-hover);
            transform: scale(1.05);
        }

        .control-btn .icon { width: 16px; height: 16px; opacity: 0.6; }
        .control-btn:hover .icon { opacity: 1; }

        .play-btn {
            background: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }

        .play-btn:hover {
            background: #e0e0e0;
            transform: scale(1.05);
        }

        .play-btn .icon { width: 16px; height: 16px; opacity: 1; filter: none; }

        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .time { font-size: 9px; color: #666; min-width: 28px; text-align: center; }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: var(--progress-bg);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: height 0.15s ease;
        }

        .progress-bar:hover { height: 6px; }

        .progress-fill {
            height: 100%;
            background: #fff;
            border-radius: 4px;
            transition: width 0.1s linear;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: -5px;
            top: -3px;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.1s;
        }

        .progress-bar:hover .progress-fill::after { opacity: 1; }

        .volume-control {
            flex: 0.5;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: flex-end;
            max-width: 120px;
            min-width: 60px;
        }

        .volume-control .icon { width: 16px; height: 16px; opacity: 0.6; cursor: pointer; }
        .volume-control .icon:hover { opacity: 1; }

        .volume-slider {
            width: 60px;
            height: 4px;
            cursor: pointer;
            accent-color: #fff;
            background: var(--progress-bg);
            border-radius: 4px;
            -webkit-appearance: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }

        .fullscreen-player-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.4s ease;
        }

        .fullscreen-player-overlay.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fullscreen-player {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
            overflow: hidden;
        }

        .player-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;

            .track-info-full p { font-size: 14px; }
            .ctrl-btn { width: 40px; height: 40px; }
            .ctrl-btn .icon { width: 18px; height: 18px; }
            .ctrl-btn.play-big { width: 56px; height: 56px; }
            .ctrl-btn.play-big .icon { width: 26px; height: 26px; }
            .buttons-full { gap: 10px; }
            .progress-row .time { font-size: 10px; min-width: 30px; }
            .dropdown-menu { right: -5px; left: auto; min-width: 160px; }
            .playlist-tab { font-size: 11px; padding: 4px 10px; }
            .playlist-info-bar { flex-direction: column; align-items: stretch; gap: 6px; }
            .playlist-actions { justify-content: center; }
            .playlist-action-btn { font-size: 10px; padding: 4px 8px; }
            .music-card { padding: 8px 10px; min-height: 56px; }
            .music-card .cover-image { width: 40px; height: 40px; min-width: 40px; }
            .music-card h3 { font-size: 12px; }
            .music-card .artist { font-size: 10px; }
            .delete-btn { width: 28px; height: 28px; right: 4px; }
            .delete-btn svg { width: 14px; height: 14px; }
            .now-playing .track-cover { width: 36px; height: 36px; min-width: 36px; }
            .track-info h4 { font-size: 11px; }
            .track-info p { font-size: 9px; }
            .control-btn { width: 28px; height: 28px; }
            .control-btn .icon { width: 14px; height: 14px; }
            .play-btn { width: 32px; height: 32px; }
            .play-btn .icon { width: 14px; height: 14px; }
            .time { font-size: 8px; min-width: 24px; }
            .volume-control .icon { width: 14px; height: 14px; }
            .volume-slider { width: 50px; }
            .add-playlist-btn { font-size: 10px; padding: 4px 8px; }
            .add-playlist-btn .icon { width: 12px; height: 12px; }
        }

        @media (max-width: 480px) {
            .cover-wrapper { width: 160px; height: 160px; }
            .track-info-full h2 { font-size: 18px; }
            .track-info-full p { font-size: 12px; }
            .ctrl-btn { width: 36px; height: 36px; }
            .ctrl-btn .icon { width: 16px; height: 16px; }
            .ctrl-btn.play-big { width: 48px; height: 48px; }
            .ctrl-btn.play-big .icon { width: 22px; height: 22px; }
            .buttons-full { gap: 8px; }
            .settings-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="fullscreen-player-overlay" id="fullscreenPlayerOverlay" onclick="closeFullscreenPlayer(event)">
        <div class="fullscreen-player" id="fullscreenPlayer" onclick="event.stopPropagation()">
            <div class="player-background" id="playerBackground"></div>
            
            <button class="sound-btn" id="soundBtn" onclick="toggleSoundMenu()">
                <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z'/%3E%3C/svg%3E" alt="sound">
            </button>
            
            <div class="sound-menu" id="soundMenu">
                <div class="menu-title">
                    <span>Громкость</span>
                    <button class="menu-close-btn" onclick="toggleSoundMenu()">✕</button>
                </div>
                <div class="sound-item">
                    <label>Громкость</label>
                    <input type="range" id="fullscreenVolume" min="0" max="100" value="70" oninput="setFullscreenVolume(this.value)">
                    <span class="val" id="fullscreenVolumeVal">70%</span>
                </div>
            </div>
            
            <button class="close-btn" onclick="closeFullscreenPlayer()">
                <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z'/%3E%3C/svg%3E" alt="close">
            </button>
            
            <div class="cover-wrapper" id="coverWrapper">
                <img id="fullscreenCover" src="" alt="" style="display:none;">
                <img class="default-cover" id="fullscreenDefaultCover" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z'/%3E%3C/svg%3E" alt="music">
            </div>
            
            <div class="track-info-full">
                <h2 id="fullscreenTrackName">Нет трека</h2>
                <p id="fullscreenTrackArtist">Выберите трек</p>
            </div>
            
            <div class="progress-full">
                <div class="progress-row">
                    <span class="time" id="fullscreenCurrentTime">0:00</span>
                    <div class="progress-track" id="fullscreenProgressTrack" onclick="fullscreenSeek(event)">
                        <div class="progress-fill-full" id="fullscreenProgressFill" style="width:0%"></div>
                    </div>
                    <span class="time" id="fullscreenTotalTime">0:00</span>
                </div>
            </div>
            
            <div class="buttons-full">
                <button class="ctrl-btn" onclick="fullscreenShuffle()" title="Перемешать">
                    <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z'/%3E%3C/svg%3E" alt="shuffle">
                </button>
                <button class="ctrl-btn" onclick="fullscreenPrev()" title="Предыдущий">
                    <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M6 6h2v12H6zm3.5 6l8.5 6V6z'/%3E%3C/svg%3E" alt="prev">
                </button>
                <button class="ctrl-btn play-big" id="fullscreenPlayBtn" onclick="fullscreenTogglePlay()">
                    <img class="icon" id="fullscreenPlayIcon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M8 5v14l11-7z'/%3E%3C/svg%3E" alt="play">
                </button>
                <button class="ctrl-btn" onclick="fullscreenNext()" title="Следующий">
                    <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z'/%3E%3C/svg%3E" alt="next">
                </button>
                <button class="ctrl-btn" onclick="fullscreenRepeat()" id="fullscreenRepeatBtn" title="Повтор">
                    <img class="icon" id="fullscreenRepeatIcon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z'/%3E%3C/svg%3E" alt="repeat">
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay"></div>

    <div class="modal-panel" id="addMusicPanel">
        <button class="close-panel" onclick="closeAddMusicModal()">
            <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z'/%3E%3C/svg%3E" alt="close">
        </button>
        <h2>Добавить музыку</h2>
        <div class="file-upload-area" id="fileUploadArea" onclick="document.getElementById('fileInput').click()">
            <img class="upload-icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z'/%3E%3C/svg%3E" alt="upload">
            <div class="file-upload-text">Нажмите для выбора аудиофайлов</div>
            <div class="file-upload-text" style="font-size: 10px;">или перетащите их сюда</div>
            <div class="selected-files" id="selectedFilesText"></div>
        </div>
        <input type="file" id="fileInput" accept="audio/*" multiple style="display: none;" onchange="handleFileSelect(event)">
        <div class="input-group">
            <label>Название</label>
            <input type="text" id="trackName" placeholder="Название трека">
        </div>
        <div class="input-group">
            <label>Исполнитель</label>
            <input type="text" id="trackArtist" placeholder="Исполнитель">
        </div>
        <div class="input-group">
            <label>Обложка</label>
            <input type="file" id="coverInput" accept="image/*" onchange="previewCover()">
            <img class="cover-preview" id="coverPreview">
        </div>
        <div class="input-group">
            <label>Плейлист</label>
            <select id="trackPlaylist"><option value="all">Все треки</option></select>
        </div>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="closeAddMusicModal()">Отмена</button>
            <button class="btn btn-primary" onclick="addMusic()">Добавить</button>
        </div>
    </div>

    <div class="modal-panel" id="createPlaylistPanel">
        <button class="close-panel" onclick="closeCreatePlaylistModal()">
            <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z'/%3E%3C/svg%3E" alt="close">
        </button>
        <h2>Создать плейлист</h2>
        <div class="subtitle">Выберите треки для нового плейлиста</div>
        <div class="input-group">
            <label>Название плейлиста</label>
            <input type="text" id="newPlaylistName" placeholder="Введите название">
        </div>
        <div class="input-group">
            <label>Треки в плейлисте</label>
            <div class="track-list-scroll" id="newPlaylistTrackList"></div>
        </div>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="closeCreatePlaylistModal()">Отмена</button>
            <button class="btn btn-primary" onclick="createPlaylistFromModal()">Создать</button>
        </div>
    </div>

    <div class="modal-panel" id="editPlaylistPanel">
        <button class="close-panel" onclick="closeEditPlaylistModal()">
            <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z'/%3E%3C/svg%3E" alt="close">
        </button>
        <h2 id="editPlaylistTitle">Редактировать плейлист</h2>
        <div class="input-group">
            <label>Название плейлиста</label>
            <input type="text" id="editPlaylistName" placeholder="Название плейлиста">
        </div>
        <div class="input-group">
            <label>Треки в плейлисте</label>
            <div class="track-list-scroll" id="editTrackList"></div>
        </div>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="closeEditPlaylistModal()">Отмена</button>
            <button class="btn btn-primary" onclick="savePlaylistEdit()">Сохранить</button>
        </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
            <h2 style="margin:0; font-size:16px;">Настройки</h2>
            <button class="settings-close" onclick="toggleSettings()">
                <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z'/%3E%3C/svg%3E" alt="close">
            </button>
        </div>
        <div class="settings-tabs">
            <button class="settings-tab active" data-tab="general" onclick="switchSettingsTab('general')">Главные</button>
            <button class="settings-tab" data-tab="customization" onclick="switchSettingsTab('customization')">Кастомизация</button>
        </div>
        <div id="generalSettings" class="settings-grid">
            <div class="setting-item"><label>Тема</label><select id="themeSelect" onchange="changeTheme()"><option value="dark">Тёмная</option><option value="darker">Чернее</option><option value="midnight">Полночная</option><option value="amoled">AMOLED</option><option value="matrix">Матрица</option></select></div>
            <div class="setting-item"><label>Акцент</label>
                <div class="color-picker">
                    <div class="color-option selected" style="background:#ffffff" onclick="setAccentColor('#ffffff')"></div>
                    <div class="color-option" style="background:#1DB954" onclick="setAccentColor('#1DB954')"></div>
                    <div class="color-option" style="background:#4488FF" onclick="setAccentColor('#4488FF')"></div>
                    <div class="color-option" style="background:#FF4444" onclick="setAccentColor('#FF4444')"></div>
                    <div class="color-option" style="background:#FFD700" onclick="setAccentColor('#FFD700')"></div>
                    <div class="color-option" style="background:#BB44FF" onclick="setAccentColor('#BB44FF')"></div>
                </div>
            </div>
            <div class="setting-item"><label>Размер шрифта <span class="range-value" id="fontSizeValue">14px</span></label><input type="range" min="10" max="22" value="14" id="fontSizeSlider" onchange="changeFontSize()"></div>
            <div class="setting-item"><label>Скругление <span class="range-value" id="borderRadiusValue">16px</span></label><input type="range" min="4" max="28" value="16" id="borderRadiusSlider" onchange="changeBorderRadius()"></div>
            <div class="setting-item"><label>Размер карточек</label><select id="cardSizeSelect" onchange="changeCardSize()"><option value="small">Компактные</option><option value="medium" selected>Средние</option><option value="large">Большие</option></select></div>
            <div class="setting-item"><label>Прозрачность <span class="range-value" id="cardOpacityVal">100%</span></label><input type="range" min="20" max="100" value="100" id="cardOpacity" onchange="changeCardOpacity()"></div>
            <div class="setting-item"><label>Скорость <span class="range-value" id="playbackSpeedValue">1.0x</span></label><input type="range" min="50" max="200" value="100" id="playbackSpeed" onchange="changePlaybackSpeed()"></div>
            <div class="setting-item"><label>Сортировка</label><select id="sortOrder" onchange="changeSortOrder()"><option value="default">По умолчанию</option><option value="name">По названию</option><option value="artist">По исполнителю</option></select></div>
            <div class="setting-item"><label>Тень карточек</label><select id="cardShadow" onchange="changeCardShadow()"><option value="none">Нет</option><option value="small">Малая</option><option value="medium" selected>Средняя</option></select></div>
            <div class="setting-item"><label>Автовоспроизведение</label><select id="autoPlay" onchange="changeAutoPlay()"><option value="true">Вкл</option><option value="false">Выкл</option></select></div>
            <div class="setting-item"><label>Длительность в карточках</label><select id="showDuration" onchange="changeShowDuration()"><option value="true">Да</option><option value="false">Нет</option></select></div>
            <div class="setting-item"><label>Обложка в плеере</label><select id="showCoverInPlayer" onchange="changeShowCoverInPlayer()"><option value="true">Да</option><option value="false">Нет</option></select></div>
            <div class="setting-item"><label>Индикатор воспроизведения</label><select id="showPlayingIndicator" onchange="changeShowPlayingIndicator()"><option value="true">Да</option><option value="false">Нет</option></select></div>
            <div class="setting-item"><label>Автосохранение</label><select id="autoSave" onchange="changeAutoSave()"><option value="true">Вкл</option><option value="false">Выкл</option></select></div>
        </div>
        <div id="customizationSettings" class="settings-grid" style="display:none;">
            <div class="setting-item"><label>Фон плеера</label><input type="file" id="playerBackgroundInput" accept="image/*" onchange="changePlayerBackground(event)"></div>
            <div class="setting-item"><label>Сбросить фон</label><button class="btn btn-secondary" style="width:100%;padding:6px;font-size:11px;" onclick="resetPlayerBackground()">Обычный черный</button></div>
            <div class="setting-item"><label>Цвет прогресса</label><input type="color" value="#ffffff" id="progressColor" onchange="updateProgressColor()"></div>
            <div class="setting-item"><label>Размер иконки <span class="range-value" id="iconSizeValue">100</span>px</label><input type="range" min="60" max="150" value="100" id="iconSize" onchange="updateIconSize()"></div>
            <div class="setting-item"><label>Позиция иконки</label><select id="iconPosition" onchange="updateIconPosition()"><option value="center">По центру</option><option value="top">Сверху</option><option value="bottom">Снизу</option></select></div>
            <div class="setting-item"><label>Размер текста <span class="range-value" id="textSizeValue">38</span>px</label><input type="range" min="20" max="60" value="38" id="textSize" onchange="updateTextSize()"></div>
            <div class="setting-item"><label>Цвет текста</label><input type="color" value="#ffffff" id="textColor" onchange="updateTextColor()"></div>
        </div>
        <div class="settings-actions">
            <button class="btn btn-primary" onclick="exportLibrary()">Экспорт библиотеки</button>
            <button class="btn btn-secondary" onclick="document.getElementById('importLibraryInput').click()">Импорт библиотеки</button>
            <input type="file" id="importLibraryInput" accept=".json" style="display:none" onchange="importLibrary(event)">
            <button class="btn btn-secondary" onclick="resetSettings()">Сброс настроек</button>
        </div>
        <div class="settings-footer">Sonify v2.0</div>
    </div>

    <div class="success-toast" id="successToast"></div>
    
    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">Загрузка музыки...</div>
    </div>

    <div class="app-container" id="appContainer">
        <div class="main-content">
            <div class="header">
                <div class="header-left">
                    <span class="logo-text">Sonify</span>
                </div>
                <div class="header-center">
                    <input type="text" class="search-box" placeholder="Поиск..." id="searchInput" oninput="filterMusic()">
                </div>
                <div class="header-right">
                    <div class="header-controls">
                        <button class="menu-toggle" id="menuToggle" onclick="toggleMenu()">
                            <span class="bar"></span>
                            <span class="bar"></span>
                            <span class="bar"></span>
                        </button>
                        <div class="dropdown-menu" id="dropdownMenu">
                            <button class="menu-item" onclick="openAddMusicModal(); closeMenu();">
                                <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z'/%3E%3C/svg%3E" alt="add">
                                Добавить музыку
                            </button>
                            <button class="menu-item" onclick="openCreatePlaylistModal(); closeMenu();">
                                <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z'/%3E%3C/svg%3E" alt="add">
                                Создать плейлист
                            </button>
                            <button class="menu-item" onclick="document.getElementById('importPlaylistInput').click(); closeMenu();">
                                <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z'/%3E%3C/svg%3E" alt="import">
                                Загрузить плейлист
                            </button>
                            <input type="file" id="importPlaylistInput" accept=".json" style="display:none" onchange="importPlaylist(event)">
                            <div class="menu-divider"></div>
                            <button class="menu-item" onclick="toggleSettings(); closeMenu();">
                                <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M19.14 12.94c.04-.3.06-.61.06-.94 0-.33-.02-.64-.06-.94l2.02-1.58c.18-.14.23-.38.12-.56l-1.89-3.28c-.12-.19-.36-.26-.56-.18l-2.38.96c-.5-.38-1.06-.68-1.66-.88L14.45 3.5c-.04-.2-.2-.34-.4-.34h-3.78c-.2 0-.36.14-.4.34l-.3 2.52c-.6.2-1.16.5-1.66.88l-2.38-.96c-.2-.08-.44-.01-.56.18l-1.89 3.28c-.12.18-.07.42.12.56l2.02 1.58c-.04.3-.06.61-.06.94 0 .33.02.64.06.94l-2.02 1.58c-.18.14-.23.38-.12.56l1.89 3.28c.12.19.36.26.56.18l2.38-.96c.5.38 1.06.68 1.66.88l.3 2.52c.04.2.2.34.4.34h3.78c.2 0 .36-.14.4-.34l.3-2.52c.6-.2 1.16-.5 1.66-.88l2.38.96c.2.08.44.01.56-.18l1.89-3.28c-.12-.18-.07-.42-.12-.56l-2.02-1.58zM12 15c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z'/%3E%3C/svg%3E" alt="settings">
                                Настройки
                            </button>
                            <div class="menu-divider"></div>
                            <button class="menu-item" onclick="exportLibrary(); closeMenu();">
                                <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z'/%3E%3C/svg%3E" alt="export">
                                Экспорт библиотеки
                            </button>
                            <button class="menu-item" onclick="document.getElementById('importLibraryInput').click(); closeMenu();">
                                <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z'/%3E%3C/svg%3E" alt="import">
                                Импорт библиотеки
                            </button>
                            <input type="file" id="importLibraryInput" accept=".json" style="display:none" onchange="importLibrary(event)">
                        </div>
                    </div>
                </div>
            </div>

            <div class="playlist-tabs" id="playlistTabs">
                <div class="playlist-tab active" data-playlist="all" onclick="switchPlaylist('all')">Все треки</div>
            </div>

            <div class="music-grid" id="musicGrid"></div>
            <div class="storage-info" id="storageInfo"></div>
        </div>

        <div class="player-bar" id="playerBar">
            <div class="now-playing" onclick="openFullscreenPlayer()">
                <div class="track-cover" id="trackCoverContainer">
                    <img id="trackCoverImage" src="" alt="" style="display:none;">
                    <img class="default-cover" id="trackCoverPlaceholder" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z'/%3E%3C/svg%3E" alt="note">
                </div>
                <div class="track-info">
                    <h4 id="currentTrack">Нет трека</h4>
                    <p id="currentArtist">Выберите трек</p>
                </div>
            </div>

            <div class="player-controls">
                <div class="controls-buttons">
                    <button class="control-btn" onclick="shufflePlay()" title="Перемешать">
                        <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z'/%3E%3C/svg%3E" alt="shuffle">
                    </button>
                    <button class="control-btn" onclick="previousTrack()" title="Предыдущий">
                        <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M6 6h2v12H6zm3.5 6l8.5 6V6z'/%3E%3C/svg%3E" alt="prev">
                    </button>
                    <button class="control-btn play-btn" id="playPauseBtn" onclick="togglePlay()" title="Воспроизвести">
                        <img class="icon" id="playIcon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='black'%3E%3Cpath d='M8 5v14l11-7z'/%3E%3C/svg%3E" alt="play">
                    </button>
                    <button class="control-btn" onclick="nextTrack()" title="Следующий">
                        <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z'/%3E%3C/svg%3E" alt="next">
                    </button>
                    <button class="control-btn" onclick="toggleRepeat()" id="repeatBtn" title="Повтор">
                        <img class="icon" id="repeatIcon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z'/%3E%3C/svg%3E" alt="repeat">
                    </button>
                </div>
                <div class="progress-container">
                    <span class="time" id="currentTime">0:00</span>
                    <div class="progress-bar" id="progressBar" onclick="seekTrack(event)">
                        <div class="progress-fill" id="progressFill" style="width:0%"></div>
                    </div>
                    <span class="time" id="totalTime">0:00</span>
                </div>
            </div>

            <div class="volume-control">
                <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z'/%3E%3C/svg%3E" alt="volume">
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70" onchange="adjustVolume()">
            </div>
        </div>
    </div>

    <script>
        const DB_NAME = 'SonifyDB';
        const STORE_TRACKS = 'tracks';
        const STORE_PLAYLISTS = 'playlists';
        let db = null;
        let musicLibrary = [];
        let playlists = ['all'];
        let currentPlaylist = 'all';
        let currentTrackIndex = -1;
        let isPlaying = false;
        let repeatMode = 'all';
        let audio = new Audio();
        let selectedFiles = [];
        let coverImage = null;
        let editingPlaylist = null;
        let soundMenuOpen = false;
        let playerBackgroundImage = null;

        let settings = {
            theme: 'dark', accentColor: '#ffffff', fontSize: 14, borderRadius: 16, cardSize: 'medium',
            cardOpacity: 100, autoPlay: true, showDuration: true, showCoverInPlayer: true,
            playbackSpeed: 100, sortOrder: 'default', cardAnimation: 'none', cardShadow: 'medium',
            gapSize: 10, showPlayingIndicator: true, autoSave: true
        };

        let customization = {
            progressColor: '#ffffff',
            iconSize: 100,
            iconPosition: 'center',
            textSize: 38,
            textColor: '#ffffff'
        };

        function switchSettingsTab(tab) {
            document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.settings-tab[data-tab="${tab}"]`).classList.add('active');
            document.getElementById('generalSettings').style.display = tab === 'general' ? 'grid' : 'none';
            document.getElementById('customizationSettings').style.display = tab === 'customization' ? 'grid' : 'none';
        }

        function filterMusic() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.music-card');
            cards.forEach(card => {
                const title = card.querySelector('h3')?.textContent.toLowerCase() || '';
                const artist = card.querySelector('.artist')?.textContent.toLowerCase() || '';
                if (title.includes(query) || artist.includes(query)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function changePlayerBackground(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    playerBackgroundImage = e.target.result;
                    document.getElementById('playerBackground').style.backgroundImage = `url(${playerBackgroundImage})`;
                    saveAllData();
                };
                reader.readAsDataURL(file);
            }
        }

        function resetPlayerBackground() {
            playerBackgroundImage = null;
            document.getElementById('playerBackground').style.backgroundImage = '';
            document.getElementById('playerBackgroundInput').value = '';
            saveAllData();
            showToast('Фон сброшен на обычный черный');
        }

        const trashIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M9,3V4H4V6H5V19A2,2 0 0,0 7,21H17A2,2 0 0,0 19,19V6H20V4H15V3H9M7,6H17V19H7V6M9,8V17H11V8H9M13,8V17H15V8H13Z"/></svg>`;

        const folderIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" style="width:12px;height:12px;vertical-align:middle;opacity:0.6;"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>`;
        const editIcon = `<img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z'/%3E%3C/svg%3E" alt="">`;
        const addIcon = `<img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z'/%3E%3C/svg%3E" alt="">`;
        const exportIcon = `<img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z'/%3E%3C/svg%3E" alt="">`;
        const playlistFolderIcon = `<img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z'/%3E%3C/svg%3E" style="width: 14px; height: 14px; vertical-align: middle; opacity: 0.6; margin-right: 3px;">`;

        function showToast(text) {
            const toast = document.getElementById('successToast');
            toast.textContent = text;
            toast.style.display = 'block';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }

        function toggleMenu() {
            const menu = document.getElementById('dropdownMenu');
            const btn = document.getElementById('menuToggle');
            menu.classList.toggle('active');
            btn.classList.toggle('active');
        }

        function closeMenu() {
            document.getElementById('dropdownMenu').classList.remove('active');
            document.getElementById('menuToggle').classList.remove('active');
        }

        document.addEventListener('click', function(e) {
            const menu = document.getElementById('dropdownMenu');
            const btn = document.getElementById('menuToggle');
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.remove('active');
                btn.classList.remove('active');
            }
        });

        function openFullscreenPlayer() {
            if (currentTrackIndex === -1) { showToast('Сначала выберите трек'); return; }
            document.getElementById('fullscreenPlayerOverlay').classList.add('active');
            updateFullscreenPlayer();
            if (playerBackgroundImage) {
                document.getElementById('playerBackground').style.backgroundImage = `url(${playerBackgroundImage})`;
            } else {
                document.getElementById('playerBackground').style.backgroundImage = '';
            }
            updateProgressColor();
        }

        function closeFullscreenPlayer(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('fullscreenPlayerOverlay').classList.remove('active');
            document.getElementById('soundMenu').classList.remove('active');
            soundMenuOpen = false;
        }

        function toggleSoundMenu() {
            soundMenuOpen = !soundMenuOpen;
            document.getElementById('soundMenu').classList.toggle('active', soundMenuOpen);
        }

        function updateFullscreenPlayer() {
            if (currentTrackIndex === -1 || !musicLibrary[currentTrackIndex]) return;
            const track = musicLibrary[currentTrackIndex];
            document.getElementById('fullscreenTrackName').textContent = track.name || 'Без названия';
            document.getElementById('fullscreenTrackArtist').textContent = track.artist || 'Неизвестный исполнитель';
            const cover = document.getElementById('fullscreenCover');
            const defaultCover = document.getElementById('fullscreenDefaultCover');
            if (track.cover) { cover.src = track.cover; cover.style.display = 'block'; defaultCover.style.display = 'none'; } 
            else { cover.style.display = 'none'; defaultCover.style.display = 'block'; }
            document.getElementById('fullscreenPlayIcon').src = isPlaying ? 
                "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M6 19h4V5H6v14zm8-14v14h4V5h-4z'/%3E%3C/svg%3E" :
                "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M8 5v14l11-7z'/%3E%3C/svg%3E";
            document.getElementById('fullscreenTotalTime').textContent = formatTime(audio.duration || 0);
        }

        function fullscreenSeek(e) {
            const rect = document.getElementById('fullscreenProgressTrack').getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        }

        function fullscreenTogglePlay() {
            if (currentTrackIndex === -1) { if (musicLibrary.length) playTrack(0); return; }
            isPlaying ? audio.pause() : audio.play().then(() => { isPlaying = true; });
            isPlaying = !isPlaying;
            document.getElementById('fullscreenPlayIcon').src = isPlaying ? 
                "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M6 19h4V5H6v14zm8-14v14h4V5h-4z'/%3E%3C/svg%3E" :
                "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M8 5v14l11-7z'/%3E%3C/svg%3E";
            updatePlayerUI();
            renderMusicGrid();
        }

        function fullscreenPrev() { previousTrack(); updateFullscreenPlayer(); }
        function fullscreenNext() { nextTrack(); updateFullscreenPlayer(); }
        function fullscreenShuffle() { shufflePlay(); updateFullscreenPlayer(); }

        function fullscreenRepeat() {
            const icon = document.getElementById('fullscreenRepeatIcon');
            if (repeatMode === 'none') { repeatMode = 'all'; icon.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z'/%3E%3C/svg%3E"; } 
            else if (repeatMode === 'all') { repeatMode = 'one'; icon.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z'/%3E%3C/svg%3E"; } 
            else { repeatMode = 'none'; icon.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z'/%3E%3C/svg%3E"; }
            document.getElementById('repeatIcon').src = icon.src;
        }

        function setFullscreenVolume(val) { audio.volume = val / 100; document.getElementById('fullscreenVolumeVal').textContent = val + '%'; }

        function updateProgressColor() {
            const color = document.getElementById('progressColor').value;
            customization.progressColor = color;
            const fill = document.getElementById('fullscreenProgressFill');
            if (fill) {
                fill.style.background = color;
                fill.style.boxShadow = '0 0 30px ' + color + '66';
            }
            document.querySelector('.progress-fill').style.background = color;
        }

        function onTrackEnd() {
            if (repeatMode === 'one') {
                audio.currentTime = 0;
                audio.play();
                return;
            }
            
            const filtered = currentPlaylist === 'all' ? musicLibrary : musicLibrary.filter(t => t.playlist === currentPlaylist);
            const currentIdx = filtered.findIndex(t => t.id === musicLibrary[currentTrackIndex]?.id);
            
            if (currentIdx !== -1 && currentIdx < filtered.length - 1) {
                const nextTrack = filtered[currentIdx + 1];
                const nextIdx = musicLibrary.indexOf(nextTrack);
                if (nextIdx !== -1) { playTrack(nextIdx); return; }
            }
            
            if (filtered.length > 0) {
                const firstTrack = filtered[0];
                const firstIdx = musicLibrary.indexOf(firstTrack);
                if (firstIdx !== -1) { playTrack(firstIdx); return; }
            }
            
            stopPlayback();
        }

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 3);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_TRACKS)) {
                        db.createObjectStore(STORE_TRACKS, { keyPath: 'id' });
                    }
                    if (!db.objectStoreNames.contains(STORE_PLAYLISTS)) {
                        db.createObjectStore(STORE_PLAYLISTS, { keyPath: 'name' });
                    }
                };
                request.onsuccess = (event) => { db = event.target.result; resolve(db); };
                request.onerror = (event) => { reject(event.target.error); };
            });
        }

        function saveAllTracksToDB() {
            return new Promise(async (resolve, reject) => {
                if (!db) { reject('База данных не открыта'); return; }
                try {
                    const transaction = db.transaction([STORE_TRACKS], 'readwrite');
                    const store = transaction.objectStore(STORE_TRACKS);
                    await new Promise((res, rej) => { const clearReq = store.clear(); clearReq.onsuccess = res; clearReq.onerror = rej; });
                    for (const track of musicLibrary) {
                        if (track && track.id) {
                            await new Promise((res, rej) => { const putReq = store.put(track); putReq.onsuccess = res; putReq.onerror = rej; });
                        }
                    }
                    resolve();
                } catch(e) { reject(e); }
            });
        }

        function deleteTrackFromDB(id) {
            return new Promise((resolve, reject) => {
                if (!db) { reject('База данных не открыта'); return; }
                const transaction = db.transaction([STORE_TRACKS], 'readwrite');
                const store = transaction.objectStore(STORE_TRACKS);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        function getAllTracksFromDB() {
            return new Promise((resolve, reject) => {
                if (!db) { reject('База данных не открыта'); return; }
                const transaction = db.transaction([STORE_TRACKS], 'readonly');
                const store = transaction.objectStore(STORE_TRACKS);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function savePlaylistsToDB() {
            return new Promise(async (resolve, reject) => {
                if (!db) { reject('База данных не открыта'); return; }
                try {
                    const transaction = db.transaction([STORE_PLAYLISTS], 'readwrite');
                    const store = transaction.objectStore(STORE_PLAYLISTS);
                    await new Promise((res, rej) => { const clearReq = store.clear(); clearReq.onsuccess = res; clearReq.onerror = rej; });
                    for (const name of playlists) {
                        if (name && name !== 'all') {
                            await new Promise((res, rej) => { const putReq = store.put({ name: name }); putReq.onsuccess = res; putReq.onerror = rej; });
                        }
                    }
                    resolve();
                } catch(e) { reject(e); }
            });
        }

        function getAllPlaylistsFromDB() {
            return new Promise((resolve, reject) => {
                if (!db) { reject('База данных не открыта'); return; }
                const transaction = db.transaction([STORE_PLAYLISTS], 'readonly');
                const store = transaction.objectStore(STORE_PLAYLISTS);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveAllData() {
            if (!settings.autoSave) return;
            try {
                if (db) { await saveAllTracksToDB(); await savePlaylistsToDB(); }
                localStorage.setItem('sonifyTracks', JSON.stringify(musicLibrary));
                localStorage.setItem('sonifyPlaylists', JSON.stringify(playlists));
                localStorage.setItem('sonifySettings', JSON.stringify(settings));
                localStorage.setItem('sonifyCustomization', JSON.stringify(customization));
                localStorage.setItem('sonifyPlayerBackground', playerBackgroundImage);
                updateStorageInfo();
                return true;
            } catch (e) { console.warn('Ошибка сохранения:', e); return false; }
        }

        async function loadAllData() {
            try {
                let tracks = []; let pls = [];
                try { tracks = await getAllTracksFromDB(); pls = await getAllPlaylistsFromDB(); } catch(e) {}
                
                if (!tracks || tracks.length === 0) {
                    const saved = localStorage.getItem('sonifyTracks');
                    if (saved) { try { const parsed = JSON.parse(saved); if (Array.isArray(parsed)) tracks = parsed; } catch(e) {} }
                }
                
                if (!pls || pls.length === 0) {
                    const sp = localStorage.getItem('sonifyPlaylists');
                    if (sp) { try { const parsed = JSON.parse(sp); if (Array.isArray(parsed)) pls = parsed.map(p => typeof p === 'string' ? { name: p } : p); } catch(e) {} }
                }
                
                musicLibrary = tracks.filter(t => t && typeof t === 'object' && t.id && t.url);
                musicLibrary.forEach(t => { if (!t.name) t.name = 'Без названия'; if (!t.artist) t.artist = 'Неизвестный исполнитель'; if (!t.playlist) t.playlist = 'all'; });
                
                playlists = ['all'];
                pls.forEach(p => { const name = typeof p === 'string' ? p : p.name; if (name && name !== 'all' && !playlists.includes(name)) { playlists.push(name); } });
                
                const ss = localStorage.getItem('sonifySettings');
                if (ss) { try { settings = { ...settings, ...JSON.parse(ss) }; } catch(e) {} }
                
                const cs = localStorage.getItem('sonifyCustomization');
                if (cs) { try { customization = { ...customization, ...JSON.parse(cs) }; } catch(e) {} }
                
                playerBackgroundImage = localStorage.getItem('sonifyPlayerBackground');
                if (playerBackgroundImage) {
                    document.getElementById('playerBackground').style.backgroundImage = `url(${playerBackgroundImage})`;
                }
                
                await saveAllData();
                return true;
            } catch (e) { console.warn('Ошибка загрузки:', e); return false; }
        }

        function updateStorageInfo() {
            const info = document.getElementById('storageInfo');
            let totalSize = 0;
            musicLibrary.forEach(t => { if (t && t.fileSize) totalSize += t.fileSize; });
            const mb = (totalSize / (1024 * 1024)).toFixed(1);
            info.textContent = 'Файлов: ' + musicLibrary.length + '  *  ' + mb + ' МБ  *  Плейлистов: ' + (playlists.length - 1);
        }

        function applySettings() {
            const root = document.documentElement;
            const themes = {
                dark: { bg: '#0a0a0a', bg2: '#121212', bg3: '#1a1a1a', bgH: '#262626', text: '#f0f0f0', text2: '#a0a0a0', border: '#1e1e1e' },
                darker: { bg: '#050505', bg2: '#0a0a0a', bg3: '#121212', bgH: '#1a1a1a', text: '#eeeeee', text2: '#888888', border: '#151515' },
                midnight: { bg: '#08081a', bg2: '#10102a', bg3: '#181838', bgH: '#222248', text: '#e0e0ff', text2: '#8888bb', border: '#1a1a3a' },
                amoled: { bg: '#000000', bg2: '#050505', bg3: '#0a0a0a', bgH: '#151515', text: '#ffffff', text2: '#888888', border: '#0a0a0a' },
                matrix: { bg: '#000800', bg2: '#001200', bg3: '#001e00', bgH: '#003000', text: '#33ff33', text2: '#1a7a1a', border: '#001e00' }
            };
            const t = themes[settings.theme] || themes.dark;
            root.style.setProperty('--bg-primary', t.bg);
            root.style.setProperty('--bg-secondary', t.bg2);
            root.style.setProperty('--bg-tertiary', t.bg3);
            root.style.setProperty('--bg-hover', t.bgH);
            root.style.setProperty('--text-primary', t.text);
            root.style.setProperty('--text-secondary', t.text2);
            root.style.setProperty('--border', t.border);
            root.style.setProperty('--accent', settings.accentColor);
            root.style.setProperty('--accent-hover', settings.accentColor + 'dd');
            root.style.setProperty('--accent-glow', settings.accentColor + '11');
            root.style.setProperty('--font-size', settings.fontSize + 'px');
            root.style.setProperty('--border-radius', settings.borderRadius + 'px');
            const grid = document.getElementById('musicGrid');
            if (grid) { grid.style.gap = (settings.gapSize || 10) + 'px'; grid.style.opacity = settings.cardOpacity / 100; }
            document.querySelectorAll('.music-card').forEach(card => {
                card.style.borderRadius = settings.borderRadius + 'px';
                card.style.transition = settings.cardAnimation === 'none' ? 'none' : settings.cardAnimation === 'fade' ? 'opacity 0.3s ease, transform 0.3s ease' : 'transform 0.3s ease, box-shadow 0.3s ease';
                card.style.boxShadow = settings.cardShadow === 'none' ? 'none' : settings.cardShadow === 'small' ? '0 4px 16px rgba(0,0,0,0.3)' : '0 8px 32px rgba(0,0,0,0.5)';
            });
            document.getElementById('themeSelect').value = settings.theme;
            document.getElementById('fontSizeSlider').value = settings.fontSize;
            document.getElementById('fontSizeValue').textContent = settings.fontSize + 'px';
            document.getElementById('borderRadiusSlider').value = settings.borderRadius;
            document.getElementById('borderRadiusValue').textContent = settings.borderRadius + 'px';
            document.getElementById('cardSizeSelect').value = settings.cardSize;
            document.getElementById('playbackSpeed').value = settings.playbackSpeed;
            document.getElementById('playbackSpeedValue').textContent = (settings.playbackSpeed / 100).toFixed(1) + 'x';
            document.getElementById('cardOpacity').value = settings.cardOpacity;
            document.getElementById('cardOpacityVal').textContent = settings.cardOpacity + '%';
            document.getElementById('autoSave').value = settings.autoSave ? 'true' : 'false';
            const coverContainer = document.getElementById('trackCoverContainer');
            if (coverContainer) coverContainer.style.display = settings.showCoverInPlayer ? 'flex' : 'none';
            document.querySelectorAll('.playing-indicator').forEach(el => el.style.display = settings.showPlayingIndicator ? 'flex' : 'none');
            if (settings.sortOrder !== 'default') sortLibrary();
        }

        function sortLibrary() {
            const order = settings.sortOrder;
            if (order === 'name') musicLibrary.sort((a, b) => a.name.localeCompare(b.name));
            else if (order === 'artist') musicLibrary.sort((a, b) => a.artist.localeCompare(b.artist));
        }

        function renderPlaylistTabs() {
            const container = document.getElementById('playlistTabs');
            if (!container) return;
            container.innerHTML = '';
            const all = document.createElement('div');
            all.className = 'playlist-tab' + (currentPlaylist === 'all' ? ' active' : '');
            all.dataset.playlist = 'all';
            all.textContent = 'Все треки';
            all.onclick = () => switchPlaylist('all');
            container.appendChild(all);
            playlists.forEach(p => {
                if (p === 'all') return;
                const tab = document.createElement('div');
                tab.className = 'playlist-tab' + (p === currentPlaylist ? ' active' : '');
                tab.dataset.playlist = p;
                const nameSpan = document.createElement('span');
                nameSpan.textContent = p;
                tab.appendChild(nameSpan);
                const removeBtn = document.createElement('button');
                removeBtn.className = 'tab-remove';
                removeBtn.textContent = '✕';
                removeBtn.title = 'Удалить плейлист';
                removeBtn.onclick = (e) => { e.stopPropagation(); if (confirm('Удалить плейлист "' + p + '"?')) deletePlaylist(p); };
                tab.appendChild(removeBtn);
                tab.ondblclick = () => openEditPlaylistModal(p);
                tab.onclick = () => switchPlaylist(p);
                container.appendChild(tab);
            });
            
            const addBtn = document.createElement('button');
            addBtn.className = 'add-playlist-btn';
            addBtn.innerHTML = `
                <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z'/%3E%3C/svg%3E" alt="add">
                Загрузить плейлист
            `;
            addBtn.onclick = () => document.getElementById('importPlaylistInput').click();
            container.appendChild(addBtn);
            
            const select = document.getElementById('trackPlaylist');
            if (select) {
